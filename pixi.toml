[project]
name = "lyric-video-remotion"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
ffmpeg = "*"

[pypi-dependencies]
openai-whisper = "*"
stable-ts = "*"
pytest = "*"

[tasks]
transcribe = "python scripts/transcribe.py"
test-py = "python -m pytest tests/test_transcribe.py -v -p no:playwright"
